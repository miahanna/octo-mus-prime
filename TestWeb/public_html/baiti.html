<html>

    <body>
        <p>Aprēķināt cik daudz informācijas var lejuplādēt</p>
 <form>
     
  <input type="number" id="sekundes"><p>sekundēs,ja interneta ātrums ir 25 Mbps.</p><br><br>

  <input type="radio" name="vieniba" onclick="rekini('KB')"> KB
  <input type="radio" name="vieniba" onclick="rekini('KiB')"> KiB

  <p id="rezultats"></p>
</form>
        
        <script>
function rekini(tips) {
  let sek = document.getElementById("sekundes").value;
  let rezultats;

  if (tips === "KB") {
    rezultats = sek * 1000;
  } else {
    rezultats = sek * 1024;
  }

  document.getElementById("rezultats").innerHTML =
    "Lejupielādēts: " + rezultats;
}

document.getElementById("sekundes").addEventListener("focus", function() {
  document.querySelector("form").reset();
  document.getElementById("rezultats").innerHTML = "";
});
</script>
    </body>
</html>
